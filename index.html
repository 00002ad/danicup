let isAdmin = false;
let state = loadState();
let firebaseReady = false;
let suppressNextSnapshot = false;

function defaultState(){
    return { pin:'0720', adminCode:'0720', name:'Danicup 2026', tournamentName:'DANICUP 2026 Couples Edition', scores:{}, undoStack:[] };
}

function loadState(){
    const base = defaultState();
    try {
        const s = localStorage.getItem('danicup2026');
        if(s){
            const parsed = JSON.parse(s);
            return {
                ...base,
                ...parsed,
                pin: parsed.pin || parsed.adminCode || base.pin,
                adminCode: parsed.adminCode || parsed.pin || base.adminCode,
                name: parsed.name || parsed.tournamentName || base.name,
                tournamentName: parsed.tournamentName || parsed.name || base.tournamentName,
                scores: parsed.scores || {},
                undoStack: parsed.undoStack || []
            };
        }
    } catch(e) {}
    return base;
}

function setSyncStatus(message){
    const el = document.getElementById('sync-status');
    if(el) el.textContent = message;
}

function stateForFirebase(){
    return {
        pin: state.pin || state.adminCode || '0720',
        adminCode: state.pin || state.adminCode || '0720',
        name: state.name || state.tournamentName || 'Danicup 2026',
        tournamentName: state.name || state.tournamentName || 'Danicup 2026',
        scores: state.scores || {},
        undoStack: state.undoStack || [],
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    };
}

function save(){
    localStorage.setItem('danicup2026', JSON.stringify(state));

    if(typeof tournamentRef !== 'undefined'){
        suppressNextSnapshot = true;
        tournamentRef.set(stateForFirebase(), { merge:true })
            .then(() => {
                firebaseReady = true;
                setSyncStatus('Live sync active • Saved to Firebase');
                setTimeout(() => { suppressNextSnapshot = false; }, 500);
            })
            .catch(err => {
                suppressNextSnapshot = false;
                console.error('Firebase save failed:', err);
                setSyncStatus('Offline/local save only • Check Firebase rules');
            });
    }
}

function startLiveSync(){
    if(typeof tournamentRef === 'undefined'){
        setSyncStatus('Local mode only • Firebase not connected');
        return;
    }

    tournamentRef.onSnapshot((docSnap) => {
        firebaseReady = true;
        if(!docSnap.exists){
            tournamentRef.set(stateForFirebase(), { merge:true });
            setSyncStatus('Live sync active • Initializing tournament data');
            return;
        }

        const data = docSnap.data() || {};
        const merged = {
            ...defaultState(),
            ...state,
            ...data,
            pin: data.pin || data.adminCode || state.pin || '0720',
            adminCode: data.adminCode || data.pin || state.adminCode || '0720',
            name: data.name || data.tournamentName || state.name || 'Danicup 2026',
            tournamentName: data.tournamentName || data.name || state.tournamentName || 'Danicup 2026',
            scores: data.scores || {},
            undoStack: data.undoStack || []
        };

        if(suppressNextSnapshot){
            state = merged;
            localStorage.setItem('danicup2026', JSON.stringify(state));
            return;
        }

        state = merged;
        localStorage.setItem('danicup2026', JSON.stringify(state));
        setSyncStatus('Live sync active • Updates appear automatically');

        if(!document.getElementById('main-app').classList.contains('hidden')){
            renderAll();
            if(!document.getElementById('page-results').classList.contains('hidden')) renderResults();
        }
    }, (err) => {
        console.error('Firebase live sync failed:', err);
        setSyncStatus('Live sync error • Check Firebase rules');
    });
}
function getKey(slot,court){ return `${slot}-${court}`; }
function getScore(slot,court){ return state.scores[getKey(slot,court)] || {sa:'',sb:'',status:'Pending',winner:''}; }
function setScore(slot,court,data){
    const key = getKey(slot,court);
    const previous = state.scores[key] ? {...state.scores[key]} : null;
    state.undoStack = state.undoStack || [];
    state.undoStack.push({key, previous});
    if(state.undoStack.length > 25) state.undoStack.shift();
    state.scores[key] = data;
    save();
    renderAll();
}

function loginPlayer(){ isAdmin=false; showApp(); }
function loginAdmin(){
    if(document.getElementById('pin-input').value === state.pin){ isAdmin=true; showApp(); }
    else { document.getElementById('pin-input').style.borderColor='red'; }
}
function logout(){ document.getElementById('login-screen').classList.remove('hidden'); document.getElementById('main-app').classList.add('hidden'); }

function showApp(){
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('main-app').classList.remove('hidden');
    document.getElementById('role-bar').textContent = (isAdmin?'Admin':'Player') + ' View • 3 Courts';
    showPage('schedule');
    renderAll();
}

function showPage(p){
    if(p === 'settings') p = 'schedule';
    ['schedule','results'].forEach(x=>{
        const page = document.getElementById('page-'+x);
        if(page) page.classList.toggle('hidden',x!==p);
        const nav=document.getElementById('nav-'+x);
        if(nav) nav.className = x===p ? 'px-3 py-1.5 rounded-lg text-sm font-medium tab-active' : 'px-3 py-1.5 rounded-lg text-sm font-medium text-gray-600 hover:bg-yellow-50';
    });
    const settings = document.getElementById('page-settings');
    if(settings) settings.classList.add('hidden');
    if(p==='results') renderResults();
}

function saveSettings(){
    state.name = document.getElementById('setting-name').value || 'Danicup 2026';
    state.tournamentName = state.name;
    state.pin = document.getElementById('setting-pin').value || '0720';
    state.adminCode = state.pin;
    save();
}
function resetAllScores(){
    const yes = window.confirm('Reset all scores and match statuses? This will clear every saved score.');
    if(!yes) return false;

    state.undoStack = state.undoStack || [];
    state.undoStack.push({resetAll:true, previousScores: JSON.parse(JSON.stringify(state.scores || {}))});
    if(state.undoStack.length > 25) state.undoStack.shift();

    state.scores = {};
    save();

    // Force all visible inputs/cards to refresh after clearing.
    renderAll();
    if(typeof renderResults === 'function') renderResults();

    const role = document.getElementById('role-bar');
    if(role) role.textContent = (isAdmin ? 'Admin' : 'Player') + ' View • All scores reset • 3 Courts';
    setSyncStatus('Live sync active • Reset saved');

    return true;
}

function resetScores(){
    return resetAllScores();
}
function undoLastSave(){
    state.undoStack = state.undoStack || [];
    const last = state.undoStack.pop();
    if(!last){
        alert('Nothing to undo yet.');
        return;
    }
    if(last.resetAll){
        state.scores = last.previousScores || {};
    } else if(last.previous === null){
        delete state.scores[last.key];
    } else {
        state.scores[last.key] = last.previous;
    }
    save();
    renderAll();
    const role = document.getElementById('role-bar');
    if(role) role.textContent = (isAdmin?'Admin':'Player') + ' View • Last save undone • 3 Courts';
    setSyncStatus('Live sync active • Undo saved');
}

function renderAll(){
    renderDashboard();
    renderSchedule();
    renderTeams();
    const actions = document.getElementById('admin-actions');
    if(actions) actions.classList.toggle('hidden', !isAdmin);
}

function renderDashboard(){
    const rrGames = SCHEDULE.filter(s=>!s.medal).reduce((n,s)=>n+s.courts.filter(c=>c).length,0);
    const medalGames = 2;
    let completed=0, ongoing=0;
    SCHEDULE.forEach((slot,si)=>slot.courts.forEach((c,ci)=>{
        if(!c) return;
        const sc=getScore(si,ci);
        if(sc.status==='Done') completed++;
        if(sc.status==='Ongoing') ongoing++;
    }));
    const totalGames = SCHEDULE.reduce((n,s)=>n+s.courts.filter(c=>c).length,0);
    const queue = Math.max(totalGames - completed - ongoing, 0);
    document.getElementById('dashboard-cards').innerHTML = [
        {n:completed,l:'Completed'},
        {n:ongoing,l:'Ongoing'}
    ].map(d=>`<div class="card p-4 text-center"><div class="text-2xl font-bold" style="color:var(--gold)">${d.n}</div><div class="text-xs text-gray-500">${d.l}</div></div>`).join('');
}

function renderSchedule(){
    const container = document.getElementById('schedule-container');
    let html = '';
    const rrComplete = allRoundRobinDone();

    SCHEDULE.forEach((slot,si)=>{
        let isMedal = !!slot.medal;
        let headerClass = isMedal ? 'gold-accent' : 'bg-yellow-50 text-yellow-800';
        html += `<div class="mb-4"><div class="${headerClass} rounded-xl px-4 py-2 font-serif font-bold text-sm mb-2">${isMedal?(slot.medal==='gold'?'🥇 Gold Match':'🥉 Bronze Match'):'Court Schedule'}</div>`;

        if(isMedal && !rrComplete){
            const label = slot.medal === 'gold' ? 'Battle for Gold' : 'Battle for Bronze';
            const rule = slot.medal === 'gold'
              ? 'Bracket A No. 1 vs Bracket B No. 1'
              : 'Bracket A No. 2 vs Bracket B No. 2';
            const umpire = slot.medal === 'gold' ? 'Rick' : 'Je';
            html += `
              <div class="match-card text-center py-6">
                <div class="text-center text-xs font-bold mb-3 rounded-lg py-1 bg-yellow-50 text-yellow-700">Court TBA</div>
                <div class="font-serif font-bold text-lg mb-1">${label}</div>
                <div class="text-sm text-gray-500 mb-3">Waiting for bracket results…</div>
                <div class="text-sm font-medium">${rule}</div>
                <div class="text-xs text-gray-400 mt-3">🏸 Umpire: ${umpire}</div>
              </div>`;
            html += `</div>`;
            return;
        }

        if(isMedal && rrComplete){
            html += `<div class="grid grid-cols-1 md:grid-cols-1 gap-3">`;
        } else {
            html += `<div class="grid grid-cols-1 md:grid-cols-3 gap-3">`;
        }

        slot.courts.forEach((c,ci)=>{
            if(isMedal && ci !== 1) return;
            if(!c){
                html+=`<div class="match-card text-center text-gray-300 py-6"><div class="text-center text-xs font-bold mb-2 rounded-lg py-1 bg-yellow-50 text-yellow-700">${isMedal?'Court TBA':'Court '+(ci+1)}</div>No Match</div>`;
                return;
            }
            const sc = getScore(si,ci);
            if(isMedal && c){
                const pair = getMedalPair(slot.medal);
                c = {...c, a: pair.a, b: pair.b};
            }
            const statusColors = {Pending:'bg-gray-100 text-gray-500',Ongoing:'bg-yellow-100 text-yellow-700',Done:'bg-green-100 text-green-600'};
            html += `<div class="match-card">`;
            html += `<div class="text-center text-xs font-bold mb-2 rounded-lg py-1 bg-yellow-50 text-yellow-700">${isMedal?'Court TBA':'Court '+(ci+1)}</div>`;
            html += `<div class="text-center mb-2"><span class="font-bold text-sm">${c.a}</span><div class="text-xs text-gray-400 my-0.5">vs</div><span class="font-bold text-sm">${c.b}</span></div>`;
            html += `<div class="flex justify-between text-xs text-gray-400 mb-2"><span>${c.bracket} • ${c.round}</span><span class="px-2 py-0.5 rounded-full ${statusColors[sc.status||'Pending']}">${sc.status||'Pending'}</span></div>`;
            if(c.ump) html+=`<div class="text-xs text-gray-400">🏸 Umpire: ${c.ump}${c.lj?' • LJ: '+c.lj:''}</div>`;
            if(isAdmin){
                const key = getKey(si,ci);
                html+=`<div class="border-t border-yellow-100 mt-2 pt-2" id="edit-${key}" data-winner="${sc.winner||''}">`;
                html+=`<div class="flex items-center justify-center gap-2 mb-2"><input id="sa-${key}" class="score-input" value="${sc.sa}" inputmode="numeric"><span class="text-gray-300">-</span><input id="sb-${key}" class="score-input" value="${sc.sb}" inputmode="numeric"></div>`;
                html+=`<select id="status-${key}" class="w-full text-xs border border-yellow-200 rounded-lg px-2 py-1 mb-2"><option ${sc.status==='Pending'?'selected':''}>Pending</option><option ${sc.status==='Ongoing'?'selected':''}>Ongoing</option><option ${sc.status==='Done'?'selected':''}>Done</option></select>`;
                html+=`<div class="flex gap-1 mb-2"><button id="win-a-${key}" onclick="selectWinner(${si},${ci},'a')" class="flex-1 text-xs py-1 rounded-lg ${sc.winner==='a'?'btn-win-active':'bg-yellow-50 text-yellow-700'}">${c.a} Wins</button><button id="win-b-${key}" onclick="selectWinner(${si},${ci},'b')" class="flex-1 text-xs py-1 rounded-lg ${sc.winner==='b'?'btn-win-active':'bg-yellow-50 text-yellow-700'}">${c.b} Wins</button></div>`;
                html+=`<button onclick="saveMatch(${si},${ci})" class="btn-save">Save Changes</button>`;
                html+=`</div>`;
            } else if(sc.status==='Done'&&sc.sa&&sc.sb){
                html+=`<div class="text-center font-bold text-lg mt-1" style="color:var(--gold)">${sc.sa} - ${sc.sb}</div>`;
            }
            html += `</div>`;
        });
        html += `</div></div>`;
    });
    container.innerHTML = html;
}

function updateScore(si,ci,field,val){
    const sc=getScore(si,ci);
    sc[field]=val;
    setScore(si,ci,sc);
}

function selectWinner(si,ci,w){
    const key = getKey(si,ci);
    const box = document.getElementById('edit-'+key);
    if(!box) return;
    const current = box.dataset.winner;
    const next = current === w ? '' : w;
    box.dataset.winner = next;

    const aBtn = document.getElementById('win-a-'+key);
    const bBtn = document.getElementById('win-b-'+key);
    if(aBtn) aBtn.className = 'flex-1 text-xs py-1 rounded-lg ' + (next === 'a' ? 'btn-win-active' : 'bg-yellow-50 text-yellow-700');
    if(bBtn) bBtn.className = 'flex-1 text-xs py-1 rounded-lg ' + (next === 'b' ? 'btn-win-active' : 'bg-yellow-50 text-yellow-700');
}

function saveMatch(si,ci){
    const key = getKey(si,ci);
    const box = document.getElementById('edit-'+key);
    const sc = {
        sa: document.getElementById('sa-'+key)?.value || '',
        sb: document.getElementById('sb-'+key)?.value || '',
        status: document.getElementById('status-'+key)?.value || 'Pending',
        winner: box?.dataset.winner || ''
    };
    const previous = state.scores[key] ? {...state.scores[key]} : null;
    state.undoStack = state.undoStack || [];
    state.undoStack.push({key, previous});
    if(state.undoStack.length > 25) state.undoStack.shift();
    state.scores[key] = sc;
    save();
    renderAll();
    const role = document.getElementById('role-bar');
    if(role) role.textContent = (isAdmin?'Admin':'Player') + ' View • Saved just now • 3 Courts';
    setSyncStatus('Live sync active • Score saved');
}

function setWinner(si,ci,w){
    const sc=getScore(si,ci);
    sc.winner=w;
    sc.status='Done';
    setScore(si,ci,sc);
}

function renderTeams(){
    const el=document.getElementById('teams-sidebar');
    el.innerHTML = ['A','B'].map(b=>`<div class="mb-3"><div class="text-xs font-bold text-gray-400 mb-1">Bracket ${b}</div>${BRACKETS[b].map(t=>`<div class="text-sm py-0.5">${t}</div>`).join('')}</div>`).join('');
}

function calcStandings(){
    const res={A:{},B:{}};
    ['A','B'].forEach(b=>BRACKETS[b].forEach(t=>res[b][t]={team:t,w:0,l:0,pf:0,pa:0,played:0}));
    SCHEDULE.forEach((slot,si)=>{
        if(slot.medal) return;
        slot.courts.forEach((c,ci)=>{
            if(!c) return;
            const sc=getScore(si,ci);
            if(sc.status!=='Done'||!sc.sa||!sc.sb) return;
            const br=c.bracket;
            const a=res[br][c.a], b2=res[br][c.b];
            if(!a||!b2) return;
            const sa=parseInt(sc.sa)||0, sb=parseInt(sc.sb)||0;
            a.played++; b2.played++;
            a.pf+=sa; a.pa+=sb; b2.pf+=sb; b2.pa+=sa;
            if(sc.winner==='a'){a.w++;b2.l++;}
            else if(sc.winner==='b'){b2.w++;a.l++;}
        });
    });
    const sort = obj => Object.values(obj).sort((a,b)=>b.w-a.w||(b.pf-b.pa)-(a.pf-a.pa)||b.pf-a.pf);
    return {A:sort(res.A),B:sort(res.B)};
}


function allRoundRobinDone(){
    return SCHEDULE
      .filter(slot => !slot.medal)
      .every((slot,si) => slot.courts.every((c,ci) => !c || getScore(si,ci).status === 'Done'));
}


function hasAnyCompletedRoundRobin(){
    return SCHEDULE.some((slot,si) => !slot.medal && slot.courts.some((c,ci) => c && getScore(si,ci).status === 'Done'));
}

function getMedalPair(type){
    const standings = calcStandings();
    const aTeam = type === 'gold' ? standings.A[0]?.team : standings.A[1]?.team;
    const bTeam = type === 'gold' ? standings.B[0]?.team : standings.B[1]?.team;
    return {
        a: aTeam || (type === 'gold' ? 'Bracket A No. 1' : 'Bracket A No. 2'),
        b: bTeam || (type === 'gold' ? 'Bracket B No. 1' : 'Bracket B No. 2')
    };
}

function renderResults(){
    const s=calcStandings();
    const el=document.getElementById('page-results');
    const hasResults = hasAnyCompletedRoundRobin();
    const gold = hasResults ? getMedalPair('gold') : {a:'TBD', b:'TBD'};
    const bronze = hasResults ? getMedalPair('bronze') : {a:'TBD', b:'TBD'};
    let html = `
    <div class="card p-4">
      <h3 class="font-serif font-bold mb-3" style="color:var(--gold)">Medal Matches</h3>
      ${hasResults ? `
      <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
        <div class="rounded-xl border border-yellow-200 bg-yellow-50 p-4">
          <div class="text-xs font-bold text-yellow-700 mb-1">Battle for Gold</div>
          <div class="font-semibold">${gold.a} vs ${gold.b}</div><div class="text-sm text-gray-500 mt-2">🏸 Umpire: <strong>Rick</strong></div>
        </div>
        <div class="rounded-xl border border-yellow-200 bg-white p-4">
          <div class="text-xs font-bold text-yellow-700 mb-1">Battle for Bronze</div>
          <div class="font-semibold">${bronze.a} vs ${bronze.b}</div><div class="text-sm text-gray-500 mt-2">🏸 Umpire: <strong>Je</strong></div>
        </div>
      </div>` : `
      <div class="rounded-xl border border-yellow-200 bg-yellow-50 p-4 text-sm text-gray-500">
        Medal matches will appear once round-robin results are saved.
      </div>`}
    </div>`;
    ['A','B'].forEach(b=>{
        html+=`<div class="card p-4 overflow-x-auto"><h3 class="font-serif font-bold mb-3" style="color:var(--gold)">Bracket ${b}</h3><table class="w-full text-sm"><thead><tr class="text-left text-xs text-gray-400 border-b"><th class="pb-2">#</th><th class="pb-2">Team</th><th class="pb-2">P</th><th class="pb-2">W</th><th class="pb-2">L</th><th class="pb-2">PF</th><th class="pb-2">PA</th><th class="pb-2">+/-</th></tr></thead><tbody>`;
        s[b].forEach((t,i)=>{
            html+=`<tr class="border-b border-yellow-100 ${i<2?'bg-yellow-50/50':''}"><td class="py-2 font-bold">${i+1}</td><td class="py-2 font-medium">${t.team}</td><td>${t.played}</td><td class="text-green-600 font-medium">${t.w}</td><td class="text-red-400">${t.l}</td><td>${t.pf}</td><td>${t.pa}</td><td class="font-medium">${t.pf-t.pa>0?'+':''}${t.pf-t.pa}</td></tr>`;
        });
        html+=`</tbody></table></div>`;
    });
    el.innerHTML=html;
}


window.resetAllScores = resetAllScores;
window.resetScores = resetScores;
window.undoLastSave = undoLastSave;

startLiveSync();
lucide.createIcons();
</script>
</body></html>
